<svg viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" font-family="TeX Gyre Heros, Helvetica, Arial, sans-serif">
<!-- EDIT ME: this .svg is the hand-authored source of the figure. Labels are <text> elements,
     positions are the x=/y= numbers (nudge to move), colours are the book palette from
     src/shared/preamble.tex. After editing, run: python3 build.py  (it re-renders the .pdf). -->
  <!-- fig_border: LAN, WAN, and the one door between them (Atlas 3.2/3.3) -->
  <defs>
    <marker id="bd_out" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#2E7D4F"/>
    </marker>
    <marker id="bd_in" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#1F5673"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="400" fill="#FFFFFF"/>

  <!-- ===== the house: your LAN ===== -->
  <path d="M40 120 L260 58 L480 120 L480 356 L40 356 Z" fill="#F6F6F3" stroke="#1B5E3A" stroke-width="1.6"/>
  <text x="60" y="146" font-size="16" font-weight="bold" fill="#1B5E3A">YOUR LAN</text>
  <text x="60" y="164" font-size="12" fill="#6A7A6A" font-style="italic">private addresses, invisible from outside</text>

  <!-- devices inside -->
  <g font-size="12.5" fill="#1A1A1A">
    <rect x="70" y="196" width="130" height="52" rx="3" fill="#FFFFFF" stroke="#2E7D4F" stroke-width="1.4"/>
    <text x="135" y="218" text-anchor="middle" font-weight="bold" fill="#1B5E3A">node</text>
    <text x="135" y="236" text-anchor="middle" font-family="DejaVu Sans Mono, monospace" font-size="11.5">192.168.1.20</text>

    <rect x="70" y="278" width="130" height="52" rx="3" fill="#FFFFFF" stroke="#D7D7CE" stroke-width="1.2"/>
    <text x="135" y="300" text-anchor="middle">laptop</text>
    <text x="135" y="318" text-anchor="middle" font-family="DejaVu Sans Mono, monospace" font-size="11.5">192.168.1.34</text>

    <rect x="236" y="278" width="130" height="52" rx="3" fill="#FFFFFF" stroke="#D7D7CE" stroke-width="1.2"/>
    <text x="301" y="300" text-anchor="middle">phone (WiFi)</text>
    <text x="301" y="318" text-anchor="middle" font-family="DejaVu Sans Mono, monospace" font-size="11.5">192.168.1.51</text>
  </g>
  <!-- LAN wiring to the router -->
  <g stroke="#C2C2BA" stroke-width="1.2" fill="none">
    <path d="M200 222 L400 222"/>
    <path d="M200 304 L228 304 M366 304 L404 304 L404 250"/>
  </g>

  <!-- ===== the router on the wall: the one door ===== -->
  <rect x="400" y="170" width="160" height="104" rx="4" fill="#FFFFFF" stroke="#1B5E3A" stroke-width="1.8"/>
  <text x="480" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E3A">router</text>
  <text x="480" y="207" text-anchor="middle" font-size="10.5" fill="#6A7A6A" font-style="italic">the one door, two faces</text>
  <rect x="410" y="216" width="140" height="19" rx="3" fill="#F6F6F3" stroke="#2E7D4F" stroke-width="1.1"/>
  <text x="480" y="229.5" text-anchor="middle" font-size="10.5" font-family="DejaVu Sans Mono, monospace" fill="#1B5E3A">LAN 192.168.1.1</text>
  <rect x="410" y="241" width="140" height="19" rx="3" fill="#EAF1F4" stroke="#1F5673" stroke-width="1.1"/>
  <text x="480" y="254.5" text-anchor="middle" font-size="10.5" font-family="DejaVu Sans Mono, monospace" fill="#1F5673">WAN 83.14.71.157</text>
  <text x="480" y="292" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6A7A6A">NAT: one table of who asked</text>

  <!-- ===== the WAN ===== -->
  <rect x="640" y="58" width="220" height="298" rx="6" fill="#EAF1F4" stroke="#1F5673" stroke-width="1.4"/>
  <text x="658" y="90" font-size="16" font-weight="bold" fill="#1F5673">THE WAN</text>
  <text x="658" y="108" font-size="11.5" fill="#6A7A6A" font-style="italic">a different country,</text>
  <text x="658" y="123" font-size="11.5" fill="#6A7A6A" font-style="italic">different laws</text>
  <text x="750" y="152" text-anchor="middle" font-size="12.5" fill="#1F5673" font-family="DejaVu Sans Mono, monospace">1.1.1.1</text>
  <text x="750" y="169" text-anchor="middle" font-size="11.5" fill="#6A7A6A">Cloudflare DNS public address</text>
  <!-- strangers -->
  <g fill="#1F5673">
    <circle cx="692" cy="228" r="7"/><circle cx="750" cy="212" r="7"/><circle cx="812" cy="234" r="7"/>
    <circle cx="712" cy="292" r="7"/><circle cx="788" cy="286" r="7"/>
  </g>
  <text x="750" y="326" text-anchor="middle" font-size="11" fill="#6A7A6A">every machine on Earth,</text>
  <text x="750" y="341" text-anchor="middle" font-size="11" fill="#6A7A6A">most of them strangers</text>

  <!-- ===== the valve ===== -->
  <!-- outbound: passes freely -->
  <line x1="560" y1="206" x2="634" y2="206" stroke="#2E7D4F" stroke-width="2.4" marker-end="url(#bd_out)"/>
  <text x="598" y="192" text-anchor="middle" font-size="11.5" fill="#2E7D4F" font-weight="bold">out: passes</text>
  <!-- inbound: blocked at the wall -->
  <line x1="634" y1="244" x2="580" y2="244" stroke="#1F5673" stroke-width="2.4" marker-end="url(#bd_in)"/>
  <line x1="570" y1="232" x2="570" y2="256" stroke="#8A5A1B" stroke-width="3.4"/>
  <text x="600" y="270" text-anchor="middle" font-size="11.5" fill="#8A5A1B" font-weight="bold">in: no reply,</text>
  <text x="600" y="284" text-anchor="middle" font-size="11.5" fill="#8A5A1B" font-weight="bold">no entry</text>

  <text x="40" y="384" font-size="13" fill="#1A1A1A">Replies to conversations you started are let back in; unasked-for visitors meet a wall, until Part 6 opens one door on purpose.</text>
</svg>
