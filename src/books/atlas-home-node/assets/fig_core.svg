<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="TeX Gyre Heros, Helvetica, Arial, sans-serif">
<!-- EDIT ME: this .svg is the hand-authored source of the figure. Labels are <text> elements,
     positions are the x=/y= numbers (nudge to move), colours are the book palette from
     src/shared/preamble.tex. After editing, run: python3 build.py  (it re-renders the .pdf). -->
  <!-- fig_core: the local AI core behind loopback sockets (Atlas 4.1, 4.3, 4.4) -->
  <defs>
    <marker id="core_ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#2E7D4F"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="860" height="400" fill="#FFFFFF"/>

  <!-- the node boundary -->
  <rect x="270" y="44" width="560" height="316" rx="6" fill="#F6F6F3" stroke="#1B5E3A" stroke-width="1.6"/>
  <text x="292" y="74" font-size="16" font-weight="bold" fill="#1B5E3A">YOUR NODE</text>
  <text x="292" y="92" font-size="12" fill="#6A7A6A" font-style="italic">one machine; every socket below exists only inside it</text>

  <!-- three local services -->
  <g font-size="13" fill="#1A1A1A">
    <rect x="470" y="112" width="330" height="60" rx="4" fill="#FFFFFF" stroke="#2E7D4F" stroke-width="1.5"/>
    <text x="488" y="136" font-weight="bold" fill="#1B5E3A">model runner</text>
    <text x="488" y="156" font-family="DejaVu Sans Mono, monospace" font-size="12">127.0.0.1:11434</text>
    <text x="700" y="146" font-size="11.5" fill="#6A7A6A">the LLM (4.1)</text>

    <rect x="470" y="192" width="330" height="60" rx="4" fill="#FFFFFF" stroke="#2E7D4F" stroke-width="1.5"/>
    <text x="488" y="216" font-weight="bold" fill="#1B5E3A">speech-to-text</text>
    <text x="488" y="236" font-family="DejaVu Sans Mono, monospace" font-size="12">127.0.0.1:PORT</text>
    <text x="700" y="226" font-size="11.5" fill="#6A7A6A">the ears (4.3)</text>

    <rect x="470" y="272" width="330" height="60" rx="4" fill="#FFFFFF" stroke="#2E7D4F" stroke-width="1.5"/>
    <text x="488" y="296" font-weight="bold" fill="#1B5E3A">embeddings + vector store</text>
    <text x="488" y="316" font-family="DejaVu Sans Mono, monospace" font-size="12">127.0.0.1:PORT</text>
    <text x="700" y="306" font-size="11.5" fill="#6A7A6A">the memory (4.4)</text>
  </g>

  <!-- your programs, inside the same machine, calling over loopback -->
  <rect x="296" y="176" width="120" height="92" rx="4" fill="#FFFFFF" stroke="#D7D7CE" stroke-width="1.3"/>
  <text x="356" y="206" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A1A1A">your apps</text>
  <text x="356" y="224" text-anchor="middle" font-size="11.5" fill="#6A7A6A">and agents</text>
  <text x="356" y="242" text-anchor="middle" font-size="11.5" fill="#6A7A6A">(Parts 6, 8)</text>

  <g stroke="#2E7D4F" stroke-width="1.4" fill="none">
    <path d="M416 200 L442 200 L442 142 L466 142" marker-end="url(#core_ah)"/>
    <path d="M416 222 L466 222" marker-end="url(#core_ah)"/>
    <path d="M416 244 L442 244 L442 302 L466 302" marker-end="url(#core_ah)"/>
  </g>
  <text x="441" y="106" text-anchor="middle" font-size="11.5" fill="#2E7D4F">plain local HTTP</text>

  <!-- the outside, pointedly disconnected -->
  <rect x="30" y="112" width="170" height="220" rx="6" fill="#EAF1F4" stroke="#1F5673" stroke-width="1.3"/>
  <text x="115" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F5673">the internet</text>
  <g fill="#1F5673">
    <circle cx="75" cy="186" r="6"/><circle cx="130" cy="176" r="6"/><circle cx="160" cy="212" r="6"/>
    <circle cx="90" cy="246" r="6"/><circle cx="145" cy="262" r="6"/>
  </g>
  <text x="115" y="308" text-anchor="middle" font-size="11.5" fill="#6A7A6A">not part of this picture</text>

  <!-- the visible gap -->
  <line x1="216" y1="130" x2="216" y2="320" stroke="#8A5A1B" stroke-width="1.4" stroke-dasharray="2 5"/>
  <text x="243" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#8A5A1B" transform="rotate(-90 243 218)">no wire crosses here</text>

  <text x="30" y="384" font-size="13" fill="#1A1A1A">A question goes in, an answer comes back, and no packet leaves the box: unplug the router and this still works.</text>
</svg>
