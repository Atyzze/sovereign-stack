<svg viewBox="0 0 860 474" xmlns="http://www.w3.org/2000/svg" font-family="TeX Gyre Heros, Helvetica, Arial, sans-serif">
<!-- EDIT ME: this .svg is the hand-authored source of the figure. Labels are <text> elements,
     positions are the x=/y= numbers (nudge to move), colours are the book palette from
     src/shared/preamble.tex. After editing, run: python3 build.py  (it re-renders the .pdf). -->
  <!-- fig_shield: defence in depth (Atlas Part 7). You above, four walls between, the floor beneath. -->
  <defs>
    <marker id="sh_ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8A5A1B"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="860" height="474" fill="#FFFFFF"/>

  <!-- the four walls, outermost first, deepening toward the core -->
  <g fill="none" stroke-linecap="butt">
    <path d="M 100 352 A 250 250 0 0 1 600 352" stroke="#C2C2BA" stroke-width="30"/>
    <path d="M 145 352 A 205 205 0 0 1 555 352" stroke="#6A7A6A" stroke-width="30"/>
    <path d="M 190 352 A 160 160 0 0 1 510 352" stroke="#2E7D4F" stroke-width="30"/>
    <path d="M 235 352 A 115 115 0 0 1 465 352" stroke="#1B5E3A" stroke-width="30"/>
  </g>
  <line x1="100" y1="352" x2="600" y2="352" stroke="#C2C2BA" stroke-width="1"/>

  <!-- numbered badges at each wall's crown -->
  <g font-size="12" font-weight="bold" text-anchor="middle">
    <circle cx="350" cy="102" r="12" fill="#FFFFFF" stroke="#C2C2BA" stroke-width="1.6"/><text x="350" y="106.5" fill="#1A1A1A">1</text>
    <circle cx="350" cy="147" r="12" fill="#FFFFFF" stroke="#6A7A6A" stroke-width="1.6"/><text x="350" y="151.5" fill="#1A1A1A">2</text>
    <circle cx="350" cy="192" r="12" fill="#FFFFFF" stroke="#2E7D4F" stroke-width="1.6"/><text x="350" y="196.5" fill="#1B5E3A">3</text>
    <circle cx="350" cy="237" r="12" fill="#FFFFFF" stroke="#1B5E3A" stroke-width="1.6"/><text x="350" y="241.5" fill="#1B5E3A">4</text>
  </g>

  <!-- you, standing watch above every wall: the first line -->
  <g stroke="#1A1A1A" stroke-width="1.6" fill="#FFFFFF">
    <circle cx="350" cy="52" r="8"/>
    <line x1="350" y1="60" x2="350" y2="80"/>
    <line x1="337" y1="69" x2="363" y2="69"/>
    <line x1="350" y1="80" x2="340" y2="92"/>
    <line x1="350" y1="80" x2="360" y2="92"/>
  </g>
  <text x="372" y="58" font-size="11.5" font-weight="bold" fill="#1A1A1A">you, knowing what you run</text>
  <text x="372" y="73" font-size="10.5" font-style="italic" fill="#6A7A6A">the first line, before any wall</text>

  <!-- the core the walls exist for -->
  <rect x="245" y="332" width="210" height="40" rx="4" fill="#FFFFFF" stroke="#1B5E3A" stroke-width="2"/>
  <text x="350" y="357" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1B5E3A">your node, and the little it holds</text>
  <text x="386" y="394" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6A7A6A">and by the drawer model, most of what a thief wants is not even here (0.3)</text>

  <!-- two attacks, dying at different depths -->
  <g stroke="#8A5A1B" fill="none">
    <line x1="62" y1="130" x2="141" y2="182" stroke-width="2" marker-end="url(#sh_ah)"/>
    <line x1="144" y1="184" x2="156" y2="196" stroke-width="2.4"/>
    <line x1="156" y1="184" x2="144" y2="196" stroke-width="2.4"/>
    <line x1="40" y1="212" x2="163" y2="244" stroke-width="2" marker-end="url(#sh_ah)"/>
    <line x1="166" y1="244" x2="178" y2="256" stroke-width="2.4"/>
    <line x1="178" y1="244" x2="166" y2="256" stroke-width="2.4"/>
  </g>
  <text x="40" y="376" font-size="10.5" font-style="italic" fill="#8A5A1B">attacks die at different depths;</text>
  <text x="40" y="391" font-size="10.5" font-style="italic" fill="#8A5A1B">no single wall is trusted alone</text>

  <!-- the walls, named -->
  <text x="640" y="106" font-size="12" font-weight="bold" fill="#1B5E3A">THE WALLS, OUTERMOST FIRST</text>
  <g font-size="11">
    <rect x="640" y="123" width="16" height="16" rx="3" fill="#C2C2BA"/>
    <text x="666" y="131" font-weight="bold" fill="#1A1A1A">kept minimal, kept patched</text>
    <text x="666" y="146" font-size="10" fill="#6A7A6A">the smallest possible surface (2.4, 7.9)</text>

    <rect x="640" y="167" width="16" height="16" rx="3" fill="#6A7A6A"/>
    <text x="666" y="175" font-weight="bold" fill="#1A1A1A">the firewall</text>
    <text x="666" y="190" font-size="10" fill="#6A7A6A">deny everything, allow three doors (7.2)</text>

    <rect x="640" y="211" width="16" height="16" rx="3" fill="#2E7D4F"/>
    <text x="666" y="219" font-weight="bold" fill="#1A1A1A">SSH by key only</text>
    <text x="666" y="234" font-size="10" fill="#6A7A6A">fail2ban walking the porch (7.3)</text>

    <rect x="640" y="255" width="16" height="16" rx="3" fill="#1B5E3A"/>
    <text x="666" y="263" font-weight="bold" fill="#1A1A1A">loopback and sandboxes</text>
    <text x="666" y="278" font-size="10" fill="#6A7A6A">127.0.0.1 binding; parsers boxed (7.4)</text>
  </g>

  <!-- the floor: the last line -->
  <rect x="40" y="412" width="780" height="38" rx="5" fill="#2E7D4F"/>
  <text x="430" y="436" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">THE FLOOR: snapshots and 3-2-1 backups (0.7, 7.5): when every wall fails, you rebuild</text>

  <text x="40" y="468" font-size="12.5" font-style="italic" fill="#1A1A1A">No single layer is trusted to be perfect; safety is the stack, from the person above it to the floor beneath it.</text>
</svg>
