<svg viewBox="0 0 840 400" xmlns="http://www.w3.org/2000/svg" font-family="TeX Gyre Heros, Helvetica, Arial, sans-serif">
<!-- EDIT ME: this .svg is the hand-authored source of the figure. Labels are <text> elements,
     positions are the x=/y= numbers (nudge to move), colours are the book palette from
     src/shared/preamble.tex. After editing, run: python3 build.py  (it re-renders the .pdf). -->
  <!-- fig_drawer: the vault vs the drawer (Atlas 0.3). Palette from shared/preamble.tex -->
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6A7A6A"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#2E7D4F"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="840" height="400" fill="#FFFFFF"/>
  <line x1="420" y1="28" x2="420" y2="372" stroke="#C2C2BA" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- ============ LEFT: THE VAULT ============ -->
  <text x="210" y="38" text-anchor="middle" font-size="17" font-weight="bold" fill="#1B5E3A">THE VAULT</text>
  <text x="210" y="56" text-anchor="middle" font-size="12" fill="#6A7A6A" font-style="italic">the cloud default</text>

  <!-- danger ring -->
  <circle cx="210" cy="185" r="88" fill="none" stroke="#8A5A1B" stroke-width="1.2" stroke-dasharray="5 4"/>

  <!-- central server holding everyone's documents -->
  <rect x="150" y="130" width="120" height="110" rx="4" fill="#F6F6F3" stroke="#D7D7CE" stroke-width="1.2"/>
  <text x="210" y="124" text-anchor="middle" font-size="12" fill="#6A7A6A">one server</text>
  <!-- 3x3 grid of documents inside -->
  <g stroke="#6A7A6A" stroke-width="1" fill="#FFFFFF">
    <rect x="162" y="142" width="22" height="26"/><path d="M178 142 l6 6 h-6 z" fill="#D7D7CE"/>
    <rect x="199" y="142" width="22" height="26"/><path d="M215 142 l6 6 h-6 z" fill="#D7D7CE"/>
    <rect x="236" y="142" width="22" height="26"/><path d="M252 142 l6 6 h-6 z" fill="#D7D7CE"/>
    <rect x="162" y="174" width="22" height="26"/><path d="M178 174 l6 6 h-6 z" fill="#D7D7CE"/>
    <rect x="199" y="174" width="22" height="26"/><path d="M215 174 l6 6 h-6 z" fill="#D7D7CE"/>
    <rect x="236" y="174" width="22" height="26"/><path d="M252 174 l6 6 h-6 z" fill="#D7D7CE"/>
    <rect x="162" y="206" width="22" height="26"/><path d="M178 206 l6 6 h-6 z" fill="#D7D7CE"/>
    <rect x="199" y="206" width="22" height="26"/><path d="M215 206 l6 6 h-6 z" fill="#D7D7CE"/>
    <rect x="236" y="206" width="22" height="26"/><path d="M252 206 l6 6 h-6 z" fill="#D7D7CE"/>
  </g>

  <!-- four devices, empty-handed, sending everything in -->
  <g fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.1">
    <rect x="52" y="92" width="22" height="16" rx="2"/>
    <rect x="52" y="286" width="22" height="16" rx="2"/>
    <rect x="346" y="92" width="22" height="16" rx="2"/>
    <rect x="346" y="286" width="22" height="16" rx="2"/>
  </g>
  <g stroke="#6A7A6A" stroke-width="1.1" fill="none">
    <line x1="80" y1="112" x2="158" y2="152" marker-end="url(#ah)"/>
    <line x1="80" y1="284" x2="158" y2="226" marker-end="url(#ah)"/>
    <line x1="340" y1="112" x2="262" y2="152" marker-end="url(#ah)"/>
    <line x1="340" y1="284" x2="262" y2="226" marker-end="url(#ah)"/>
  </g>

  <text x="210" y="298" text-anchor="middle" font-size="12" font-style="italic" fill="#8A5A1B">one break-in exposes everyone</text>
  <text x="210" y="352" text-anchor="middle" font-size="13.5" fill="#1A1A1A">everyone's data, gathered in one place</text>

  <!-- ============ RIGHT: THE DRAWER ============ -->
  <text x="630" y="38" text-anchor="middle" font-size="17" font-weight="bold" fill="#1B5E3A">THE DRAWER</text>
  <text x="630" y="56" text-anchor="middle" font-size="12" fill="#6A7A6A" font-style="italic">this book's default</text>

  <!-- messages relayed straight through the empty centre -->
  <g stroke="#2E7D4F" stroke-width="1.1" fill="none">
    <line x1="500" y1="106" x2="748" y2="288" marker-end="url(#ahg)"/>
    <line x1="500" y1="288" x2="748" y2="106" marker-end="url(#ahg)"/>
  </g>

  <!-- the relay: dashed, empty -->
  <rect x="578" y="164" width="104" height="66" rx="4" fill="#FFFFFF" stroke="#2E7D4F" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="630" y="192" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1B5E3A">relay</text>
  <text x="630" y="210" text-anchor="middle" font-size="11.5" fill="#6A7A6A">stores nothing</text>

  <!-- four devices, each keeping its own copy at the edge -->
  <g fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.1">
    <rect x="470" y="92" width="22" height="16" rx="2"/>
    <rect x="470" y="286" width="22" height="16" rx="2"/>
    <rect x="768" y="92" width="22" height="16" rx="2"/>
    <rect x="768" y="286" width="22" height="16" rx="2"/>
  </g>
  <!-- the data, sitting beside each device -->
  <g stroke="#1B5E3A" stroke-width="1" fill="#FFFFFF">
    <rect x="446" y="88" width="17" height="21"/><path d="M458 88 l5 5 h-5 z" fill="#2E7D4F"/>
    <rect x="446" y="282" width="17" height="21"/><path d="M458 282 l5 5 h-5 z" fill="#2E7D4F"/>
    <rect x="797" y="88" width="17" height="21"/><path d="M809 88 l5 5 h-5 z" fill="#2E7D4F"/>
    <rect x="797" y="282" width="17" height="21"/><path d="M809 282 l5 5 h-5 z" fill="#2E7D4F"/>
  </g>

  <text x="630" y="352" text-anchor="middle" font-size="13.5" fill="#1A1A1A">data lives at the edges; the centre is empty</text>
</svg>
