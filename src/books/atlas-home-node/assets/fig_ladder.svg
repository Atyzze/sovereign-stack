<svg viewBox="0 0 560 460" xmlns="http://www.w3.org/2000/svg" font-family="TeX Gyre Heros, Helvetica, Arial, sans-serif">
<!-- EDIT ME: this .svg is the hand-authored source of the figure. Labels are <text> elements,
     positions are the x=/y= numbers (nudge to move), colours are the book palette from
     src/shared/preamble.tex. After editing, run: python3 build.py  (it re-renders the .pdf). -->
  <!-- fig_ladder: learn to google, until you make your own google (Atlas 2.1) -->
  <rect x="0" y="0" width="560" height="460" fill="#FFFFFF"/>

  <!-- ladder rails -->
  <line x1="120" y1="70" x2="120" y2="420" stroke="#C2C2BA" stroke-width="3"/>
  <line x1="210" y1="70" x2="210" y2="420" stroke="#C2C2BA" stroke-width="3"/>

  <!-- flag at the top -->
  <line x1="165" y1="70" x2="165" y2="34" stroke="#1B5E3A" stroke-width="2"/>
  <path d="M165 34 l64 9 l-64 9 z" fill="#2E7D4F"/>
  <text x="244" y="48" font-size="14" font-weight="bold" fill="#1B5E3A">your own google</text>

  <!-- rungs, bottom to top; each maps to a Part -->
  <g stroke="#1B5E3A" stroke-width="5" stroke-linecap="round">
    <line x1="120" y1="392" x2="210" y2="392"/>
    <line x1="120" y1="316" x2="210" y2="316"/>
    <line x1="120" y1="240" x2="210" y2="240"/>
    <line x1="120" y1="164" x2="210" y2="164"/>
    <line x1="120" y1="88"  x2="210" y2="88"/>
  </g>

  <!-- rung numbers -->
  <g font-size="12.5" font-weight="bold" fill="#FFFFFF">
    <circle cx="120" cy="392" r="11" fill="#2E7D4F"/><text x="120" y="396.5" text-anchor="middle">1</text>
    <circle cx="120" cy="316" r="11" fill="#2E7D4F"/><text x="120" y="320.5" text-anchor="middle">2</text>
    <circle cx="120" cy="240" r="11" fill="#2E7D4F"/><text x="120" y="244.5" text-anchor="middle">3</text>
    <circle cx="120" cy="164" r="11" fill="#2E7D4F"/><text x="120" y="168.5" text-anchor="middle">4</text>
    <circle cx="120" cy="88"  r="11" fill="#1B5E3A"/><text x="120" y="92.5"  text-anchor="middle">5</text>
  </g>

  <!-- rung labels -->
  <g font-size="14" fill="#1A1A1A">
    <text x="236" y="388">ask a capable model anything</text>
    <text x="236" y="405" font-size="11.5" fill="#6A7A6A">the bootstrap: someone else's computer, for now</text>

    <text x="236" y="312">learn to search and verify for yourself</text>
    <text x="236" y="329" font-size="11.5" fill="#6A7A6A">the habit under every step (2.1)</text>

    <text x="236" y="236">run a model of your own, locally</text>
    <text x="236" y="253" font-size="11.5" fill="#6A7A6A">Part 4: the engine moves into the house</text>

    <text x="236" y="160">let it read your own documents</text>
    <text x="236" y="177" font-size="11.5" fill="#6A7A6A">Part 5: retrieval over what you keep</text>

    <text x="236" y="84">give it all of Wikipedia, offline</text>
    <text x="236" y="101" font-size="11.5" fill="#6A7A6A">Part 5: answers with no company in the loop</text>
  </g>

  <!-- ground line -->
  <line x1="70" y1="420" x2="260" y2="420" stroke="#1A1A1A" stroke-width="1.4"/>
  <text x="70" y="443" font-size="13" fill="#1A1A1A" font-style="italic">Each rung stands on the one below; none is skipped.</text>
</svg>
