# Sovereign Stack, Volume 1 -- project configuration.
#
# A small, real example of the format-per-job idea from "How this book was made":
# TOML is for configuration a human edits by hand. This file is not decorative.
# build.sh reads the [version] block below (volume and version) and combines it
# with the name of the folder the project sits in (the iteration) to stamp the
# version tag onto every page. The rest records the settings the build uses, so
# the project documents itself in the format it recommends for the job.

[project]
title = "Sovereign Stack, Volume 1: Home Node"
slug  = "sovereign-stack-vol1"

[version]
# The tag is v{volume}v{version}i{iteration}.
volume  = 1   # this is Volume 1
version = 1   # 1 means "not yet shared"; bump only on an external share
# iteration is NOT set here: it is taken from the folder name at build time,
# so renaming the folder (e.g. to "18") is what advances the iteration (i18).

[build]
# Recorded for reference; build.sh currently mirrors these in its pandoc call.
# build.sh writes the finished PDF to outputs/ and every byproduct to temp/
# (kept for review; clear with ./build.sh clean).
main     = "sovereign-stack-vol1"   # base name of the .md / .tex / .pdf
engine   = "xelatex"
mainfont = "TeX Gyre Pagella"
sansfont = "TeX Gyre Heros"
monofont = "DejaVu Sans Mono"
paper    = "a4paper"   # the default edition; the A5 variant is built with ./build.sh a5
# The book ships A4 by default and an A5 variant from the same manuscript. The
# paper is a build parameter, not a value read from here: build.sh writes the
# selected geometry into the generated src/paper.tex (run ./build.sh a5 or
# ./build.sh both). This line records the default edition for reference.

[tooling]
# The Python version this project targets and settles on. The build scripts
# (preprocess.py, mkversion.py, the tests) use only the standard library,
# including tomllib, so they run on 3.11 and later; 3.14 is the declared target.
python = "3.14"
